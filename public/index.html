<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>List Maker</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="css/all.css" rel="stylesheet">
    <link href="css/index.css" rel="stylesheet">
</head>

<body>
    <div id="sign-in-page">
        <form id="sign-in">
            <input type="email" id="email" placeholder="Email">
            <input type="submit" value="View Lists">
        </form>
    </div>
    <div id="all-list-page">
        <button class="sign-out-button">Sign Out</button>
        <form id="new-list">
            <input type="text" id="new-list-name" required>
            <input type="submit" value="New List">
        </form>
        <ul id="all-lists"></ul>
    </div>
    <div id="single-list-page">
        <button class="sign-out-button">Sign Out</button>
        <button id="back-to-lists">Back to Lists</button>
        <h1>List maker</h1>
        <h2 id="saving-text">Saving in <span id="save-count"></span></h2>
        <h2 id="list-name"></h2>
        <form id="new-item-form">
            <h3>New item: </h2>
            <input type="text" id="new-item">
            <input type="submit" value="Add">
        </form>
        <button id="save">Save List</button>
        <ol id="single-list"></ol>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <script>
        $('#new-item-form').submit(function(e) {
            e.preventDefault();
            AddRow($('#new-item').val());
        });

        $('#sign-in').submit(function(e) {
            e.preventDefault();

            auth.signInWithEmailAndPassword($('#email').val(), "ListPassword")
                .catch((error) => {
                    if (error.code.includes("user-not-found")) {
                        auth.createUserWithEmailAndPassword($('#email').val(), "ListPassword")
                            .catch((error) => {
                                window.alert(error.message);
                            });
                    } else {
                        window.alert(error.message);
                    }
                });
        });

        function AddRow(s) {
            let li = $('<li class="list-item"></li>');

            let row = $('<div class="row"></div>');

            let buttonDiv = $('<div class="up-down-buttons"></div>');
            let upButton = $('<button class="up-button"><i class="fas fa-arrow-up"></i></div>');
            upButton.click(function() {
                li.insertBefore(li.prev());
            });
            buttonDiv.append(upButton);
            let downButton = $('<button class="down-button"><i class="fas fa-arrow-down"></i></div>');
            downButton.click(function() {
                li.insertAfter(li.next());
            });
            buttonDiv.append(downButton);

            let text = $('<p>' + s + '</p>');
            $('#new-item').val('');

            let deleteButton = $('<button class="delete-button"><i class="fas fa-trash"></i></button>');
            deleteButton.click(function() {
                li.remove();
            });

            row.append(buttonDiv, text, deleteButton);
            li.append(row);

            $('#single-list').append(li);
        }
    </script>

    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/8.8.1/firebase-app.js"></script>
    <!-- Database CDN -->
    <script src="https://www.gstatic.com/firebasejs/8.8.1/firebase-database.js"></script>
    <!-- Authentication CDN -->
    <script src="https://www.gstatic.com/firebasejs/8.8.1/firebase-auth.js"></script>
    <!--Cloud functions CDN-->
    <script src="https://www.gstatic.com/firebasejs/8.8.1/firebase-functions.js"></script>

    <script>
        // Your web app's Firebase configuration
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyCpazfz92YtB4GJF8FstlaISQpESLiqp-Q",
            authDomain: "list-project-72696.firebaseapp.com",
            databaseURL: "https://list-project-72696-default-rtdb.firebaseio.com",
            projectId: "list-project-72696",
            storageBucket: "list-project-72696.appspot.com",
            messagingSenderId: "898539254457",
            appId: "1:898539254457:web:ae8fa9768d1af21083a168",
            measurementId: "G-08SCE11N4X"
        };
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);

        let database = firebase.database();
        let auth = firebase.auth();
    </script>
    <script>
        $('#save').click(function() {
            saveList($('#list-name').html());

            if (timer == null) {
                $("#saving-text").show();
                window.alert("List created and saved");
                startTimer();
            }
        });

        function saveList(listName) {
            let list = [];
            $(".list-item").each(function() { list.push($(this).text()) });
            database.ref(auth.currentUser.uid + "/" + listName).set(list);
        }

        $('.sign-out-button').click(function() {
            auth.signOut();
        });

        $('#back-to-lists').click(function() {
            openAllListPage();
        });

        auth.onAuthStateChanged((user) => {
            $('#single-list').empty();
            if (user) {
                openAllListPage();
            } else {
                openSignInPage();
            }
        });

        function openSignInPage() {
            $('#sign-in-page').show();
            $('#all-list-page').hide();
            $('#single-list-page').hide();

            stopTimer();
        }

        function openAllListPage() {
            $('#sign-in-page').hide();
            $('#all-list-page').show();
            $('#single-list-page').hide();

            $('#all-lists').empty();

            $('#save-count').empty();

            stopTimer();

            database.ref(auth.currentUser.uid).get().then(function(s) {
                if (s.val() != null) {
                    var lists = Object.keys(s.val());
                    for (var i = 0; i < lists.length; i++) {
                        createListItem(lists[i]);
                    }
                }
            });
        }

        function createListItem(listName) {
            var li = $('<li></li>');

            li.append('<p>' + listName + '</p>');

            var viewButton = $('<button>View List</button>');
            viewButton.attr("value", listName);
            viewButton.click(function() {
                openSingleListPage(listName, false);
            });
            li.append(viewButton);

            var deleteButton = $('<button>Delete List</button>');
            deleteButton.attr("value", listName);
            deleteButton.click(function() {
                if (window.confirm("Delete list: " + listName + "?")) {
                    database.ref(auth.currentUser.uid + "/" + listName).remove().then(function() {
                        openAllListPage();
                    });
                }
            });
            li.append(deleteButton);

            $('#all-lists').append(li);
        }

        function openSingleListPage(listName, newList) {
            $('#sign-in-page').hide();
            $('#all-list-page').hide();
            $('#single-list-page').show();

            $('#single-list').empty();

            $('#list-name').html(listName);

            if (!newList) {
                database.ref(auth.currentUser.uid + "/" + listName).get().then(function(s) {
                    var data = s.val();
                    for (var i = 0; i < data.length; i++) {
                        AddRow(data[i]);
                    }

                    countdown = 5;

                    startTimer();

                    $("#saving-text").show();
                });
            } else {
                $('#saving-text').hide();
            }
        }

        $('#new-list').submit(function(e) {
            e.preventDefault();

            openSingleListPage($('#new-list-name').val(), true);
        });

        var timer;
        var countdown = 5;

        function startTimer() {
            timer = setInterval(function() {
                if (countdown <= 1) {
                    saveList($('#list-name').html());
                    countdown = 5;
                } else {
                    countdown--;
                }
                $('#save-count').html(countdown);
            }, 1000)
        }

        function stopTimer() {
            clearInterval(timer);
            timer = null;
        }
    </script>
</body>
</html>
